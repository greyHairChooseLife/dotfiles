# vim-style keybindings

h seek -1
; seek 1
j seek -10
l seek 10
k cycle pause

# A-B loop: a sets A point, then B point, third press clears
a ab-loop

# jump to 10-90% of the file
1 seek 10 absolute-percent
2 seek 20 absolute-percent
3 seek 30 absolute-percent
4 seek 40 absolute-percent
5 seek 50 absolute-percent
6 seek 60 absolute-percent
7 seek 70 absolute-percent
8 seek 80 absolute-percent
9 seek 90 absolute-percent

# playback speed
> multiply speed 1.1
< multiply speed 0.9
r set speed 1.0

# display
f cycle fullscreen
m cycle mute

# subtitles
s cycle sub-visibility
S cycle sub
[ add sub-delay -0.5
] add sub-delay 0.5

# frame stepping
, frame-back-step
. frame-step

# chapter navigation
{ add chapter -1
} add chapter 1
