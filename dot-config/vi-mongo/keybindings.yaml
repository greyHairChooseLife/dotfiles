        description: Duplicate
    duplicateDocumentNoConfirm:
        keys: [Alt+D]
        description: Duplicate no confirm
    deleteDocument:
        keys: [Ctrl+d]
        description: Delete
    deleteDocumentNoConfirm:
        keys: [Alt+d]
        description: Delete no confirm
    copyValue:
