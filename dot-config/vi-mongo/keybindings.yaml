        description: Change view
    peekDocument:
        keys: [Enter]
        runes: [o]
        description: Peek
    fullPagePeek:
        runes: [O]
        description: Full peek
    addDocument:
        runes: [A]
        description: Add new
    editDocument:
        runes: [E]
        description: Full Edit
    inlineEdit:
        runes: [e]
        description: Inline edit
    duplicateDocument:
