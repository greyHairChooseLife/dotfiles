global:
    closeApp:
        keys: [Ctrl+c]
        description: Close application
    toggleFullScreenHelp:
        runes: ['?']
        description: Toggle full screen help
    openConnection:
        keys: [Ctrl+o]
        description: Open connection page
    showStyleModal:
        keys: [Ctrl+t]
        description: Toggle style change modal
    toggleHeader:
        runes: [t]
        description: Expand/collapse header
navigation:
    moveUp:
        keys: [Up]
        runes: [k]
        description: Move up
    moveDown:
        keys: [Down]
        runes: [j]
        description: Move down
    moveLeft:
        keys: [Left]
        runes: [h]
        description: Move left
    moveRight:
        keys: [Right]
        runes: [l]
        description: Move right
help:
    close:
        keys: [Esc]
        description: Close help
    search:
        runes: [/]
        description: Search keybindings
    editKey:
        runes: [e]
        description: Edit keybinding
connection:
    connectionForm:
        saveConnection:
            keys: [Ctrl+s, Enter]
            description: Save connection
        focusList:
            keys: [Ctrl+h, Ctrl+Left]
            description: Focus Connection List
    connectionList:
        focusForm:
            keys: [Ctrl+l, Ctrl+Right]
            description: Move focus to form
        deleteConnection:
            keys: [Ctrl+d]
            runes: [D]
            description: Delete selected connection
        editConnection:
            runes: [E]
            description: Edit selected connection
        setConnection:
            keys: [Enter, Space]
            description: Set selected connection
main:
    focusNext:
        keys: [Ctrl+l, Tab]
        description: Focus next component
    focusPrevious:
        keys: [Ctrl+h, Backtab]
        description: Focus previous component
    hideDatabases:
        keys: [Ctrl+n]
        description: Hide databases
    showAIQuery:
        keys: [Ctrl+a]
        description: Show AI prompt
    showServerInfo:
        keys: [Ctrl+s]
        description: Show server info
databases:
    filterBar:
        runes: [/]
        description: Focus filter bar
    clearFilter:
        keys: [Ctrl+u]
        description: Clear filter
    expandAll:
        runes: [E]
        description: Expand all
    collapseAll:
        runes: [W]
        description: Collapse all
    addCollection:
        runes: [A]
        description: Add collection
    deleteCollection:
        keys: [Ctrl+d]
        runes: [D]
        description: Delete collection
    renameCollection:
        runes: [R]
        description: Rename collection
filterBar:
    closeFilter:
        keys: [Escape]
        description: Close filter bar
    clearFilter:
        keys: [Ctrl+u]
        description: Clear filter
content:
    switchView:
        runes: [v]
        description: Change view
    peekDocument:
        keys: [Enter]
        runes: [o]
        description: Quick peek
    fullPagePeek:
        runes: [O]
        description: Full page peek
    addDocument:
        runes: [A]
        description: Add new
    editDocument:
        runes: [s]
        description: Edit
    inlineEdit:
        runes: [e]
        description: Inline edit
    duplicateDocument:
        runes: [D]
        description: Duplicate
    duplicateDocumentNoConfirm:
        keys: [Alt+D]
        description: Duplicate no confirm
    deleteDocument:
        keys: [Ctrl+d]
        runes: [d]
        description: Delete
    deleteDocumentNoConfirm:
        keys: [Alt+d]
        description: Delete no confirm
    copyValue:
        runes: [c]
        description: Copy highlighted
    copyDocument:
        runes: ["Y"]
        description: Copy document
    refresh:
        keys: [Ctrl+r]
        runes: [R]
        description: Refresh
    toggleQueryBar:
        runes: [/]
        description: Toggle query bar
    nextDocument:
        runes: [']']
        description: Next document
    previousDocument:
        runes: ['[']
        description: Previous document
    nextPage:
        runes: ["n"]
        description: Next page
    previousPage:
        runes: [p]
        description: Previous page
    toggleSortBar:
        runes: [x]
        description: Toggle sort bar
    sortByColumn:
        runes: [S]
        description: Sort by current column
    hideColumn:
        runes: [H]
        description: Hide current column
    resetHiddenColumns:
        keys: [Ctrl+r]
        description: Reset hidden columns
    toggleQueryOptions:
        keys: [Alt+o]
        description: Toggle query options
    multipleSelect:
        runes: [V]
        description: Multiple select
    clearSelection:
        keys: [Esc]
        description: Clear selection
peeker:
    moveToTop:
        runes: [g]
        description: Move to top
    moveToBottom:
        runes: [G]
        description: Move to bottom
    copyHighlight:
        runes: ["y"]
        description: Copy highlighted
    copyValue:
        runes: ["Y"]
        description: Copy only value
    toggleFullScreen:
        runes: [F]
        description: Toggle full screen
    exit:
        runes: [q]
        description: Exit
