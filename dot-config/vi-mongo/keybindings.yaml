        keys: [Ctrl+d]
        description: Clear input
    paste:
        keys: [Ctrl+v]
        description: Paste from clipboard
index:
    addIndex:
        runes: [A]
        description: Add index
    deleteIndex:
        keys: [Ctrl+d]
        runes: [D]
        description: Delete index
indexAddForm:
    exitForm:
        keys: [Esc]
        description: Exit form
    addColumn:
        keys: [Ctrl+a]
        description: Add column
    createIndex:
        keys: [Ctrl+s]
        description: Create index
aiQuery:
