# Commander - command reference library

taskwarrior:
    - desc: "delete all deleted tasks"
      cmd: task status:deleted purge
    - desc: "taskwarrior command pallet"
      cmd: vi ~/dotfiles/scripts/bin/taskwarrior-cheatsheet.yaml

share_something:
    - desc: "share process using QR code"
      cmd: ssh -p 443 -R0:localhost:3000 qr@free.pinggy.io
    - desc: "share file using QR code"
      cmd: share-file-using-QR-code.sh
    - desc: "share docker image"
      cmd: share-docker-image-temporarily.sh

git_github:
    - desc: "List repositories for a specific user or organization"
      cmd: |
        gh repo list <username/org>
    - desc: "Clone a repo from one of your organizations (interactive)"
      cmd: |
        org=$(gh org list | fzf) && repo=$(gh repo list "$org" | fzf | awk '{print $1}') && gh repo clone "$repo"
    - desc: "Clone repository using a specific branch"
      cmd: |
        gh repo clone <owner>/<repo> -- -b <branch-name>
    - desc: "Create branch from git rev"
      cmd: |
        git checkout -b <new-branch-name> [<start-point>]
    - desc: "Remove unneeded remote-tracking branch locally"
      cmd: |
        git branch -d -r <remote-name>/<branch-name>
    - desc: "Clean up all remote-tracking origin branches"
      cmd: |
        git branch -r | grep 'origin/' | grep -v 'HEAD' | xargs git branch -rd
    - desc: "Delete a remote branch"
      cmd: |
        git push origin --delete <branch-name>
    - desc: "Show which remote branch each local branch tracks"
      cmd: |
        git branch -vv
    - desc: "Remove upstream tracking for a local branch"
      cmd: |
        git branch --unset-upstream <local-branch-name>
      note: "After unsetting, git push will use the default upstream setting"
    - desc: "Rename a branch"
      cmd: |
        git branch -m [<old-branch>] <new-branch>
    - desc: "Revert the last commit (leaves history intact)"
      cmd: |
        git revert HEAD
      note: "Range also possible: git revert HEAD~3..HEAD — but may cause conflicts"
    - desc: "Dry-run fetch (check without downloading)"
      cmd: |
        git fetch --dry-run
    - desc: "Create PR"
      cmd: |
        gh pr create --base <base-branch>
      note: "Variations: --repo <owner>/<repo> to target a specific repo"
    - desc: "Merge a PR"
      cmd: |
        gh pr merge <pr-number>
    - desc: "View PR diff (pipeable to delta)"
      cmd: |
        gh pr diff <pr-number>
    - desc: "Checkout a PR locally"
      cmd: |
        gh pr checkout <pr-number>
    - desc: "Issue: create"
      cmd: |
        gh issue create
    - desc: "Issue: list"
      cmd: |
        gh issue list
    - desc: "Issue: view / edit / close / reopen"
      cmd: |
        gh issue view <issue-number>
      note: "Variations: edit / close / reopen / comment / assign <issue-number>"
    - desc: "Change commit author"
      cmd: |
        git commit --amend --author="Name <email>" --no-edit
    - desc: "Download a specific git revision as zip"
      cmd: |
        curl -L https://github.com/<user>/<repo>/archive/[commit|branch|tag].zip -o output.zip
      note: "from github"

gh_gist:
    - desc: "View a gist (interactive)"
      cmd: |
        gh gist view $(gh gist list -L 30 | column -t -s $'\t' | fzf | awk '{print $1}')
      note: "Variations: delete / edit / clone — same pattern, swap subcommand"
    - desc: "Delete a gist (interactive)"
      cmd: |
        gh gist delete $(gh gist list -L 30 | column -t -s $'\t' | fzf | awk '{print $1}')
    - desc: "Edit a gist (interactive)"
      cmd: |
        gh gist edit $(gh gist list -L 30 | column -t -s $'\t' | fzf | awk '{print $1}')
    - desc: "Clone a gist (interactive)"
      cmd: |
        gh gist clone $(gh gist list -L 30 | column -t -s $'\t' | fzf | awk '{print $1}')

editor:
    - desc: "pipe: align columns by tab"
      cmd: |
        | column -t -s $'\t'
    - desc: "pipe: print Nth column (awk)"
      cmd: |
        | awk '{print $3}'
    - desc: "pipe: in-place string replace (sed)"
      cmd: |
        | sed -i 's/old-string/new-string/g' <file path>
    - desc: "pipe: delete a specific line (sed)"
      cmd: |
        | sed '2d'
      note: "Variations: '2,4d' for range; '/^pattern/d' for pattern match"
    - desc: "pipe: grep case-sensitive match"
      cmd: |
        | grep -s "Call stack"
    - desc: "pipe: grep only matched portion (not full line)"
      cmd: |
        | grep -o -- "0x.*[0-9a-f]"

misc:
    - desc: "rg: search with context lines"
      cmd: |
        rg -C 5 "pattern" /path/to/file
      note: "Variations: -B N (before), -A N (after), -C N (both)"
    - desc: "rg: invert match (exclude pattern)"
      cmd: |
        rg -v "^test" file.txt
    - desc: "awk: print Nth column"
      cmd: |
        ls -l | awk '{print $3}'
    - desc: "watch: monitor command output every N seconds"
      cmd: |
        watch -n 1 'command'
    - desc: "Set desktop background with feh"
      cmd: |
        feh --bg-scale /path/to/image.jpg
    - desc: "PDF: extract page range"
      cmd: |
        pdfseparate -f <first_page_number> -l <last_page_number> input.pdf page_%d.pdf
      note: "Combine back with: pdfunite page_*.pdf output.pdf"
    - desc: "PDF: compress to smaller size (ebook preset)"
      cmd: |
        ghostscript -sDEVICE=pdfwrite -dPDFSETTINGS=/ebook -o small.pdf large.pdf
      note: "Presets: /screen (lowest), /ebook, /printer, /prepress (highest)"
    - desc: "PDF: merge multiple files into one"
      cmd: |
        pdfunite file1.pdf file2.pdf output.pdf
    - desc: "Inspect alias or function definition"
      cmd: |
        type <alias or function>
    - desc: "Interactive regex builder"
      cmd: |
        regex <path/to/file>
    - desc: "Stream command output in real time via sig"
      cmd: |
        while true; do <ps aux>; sleep 1; done | sig
    - desc: "Show all ports"
      cmd: |
        pvw -A
      note: "Filter specific port: pvw -A --ports <port>"
    - desc: "Find files and pipe to interactive grep"
      cmd: |
        fd 'tmuxp.' -x cat | sig -a
    - desc: "Browse curl --help interactively"
      cmd: |
        curl --help all | fzf --preview "curl --help all | grep -A 15 {}"
    - desc: "Create zip of everything (excluding hidden)"
      cmd: |
        zip -r myfiles.zip .
      note: "Include hidden files: zip -r archive.zip .* *"
    - desc: "Touchpad: find device ID"
      cmd: |
        xinput list
      note: "Then disable: xinput disable <ID> / enable: xinput enable <ID>"
    - desc: "Download youtube video using yt-dlp"
      cmd: |
        echo "링크1 링크2 링크3" | xargs -t -d" " -P4 -I{} yt-dlp -f bestvideo+bestaudio --merge-output-format mkv "{}"
      note: "extension of `.mkv` for best quality\ruse `cat` instead of echo for many links"
    - desc: "Iterate files and do command for each"
      cmd: |
        for f in *.pdf; do mv "$f" "$f.bak"; done
      note: "to ignore directory for file in *; do test -f \"$file\" && mv \"$file\" \"$file.bak\"; done"

hardware:
    - desc: "autorandr: save current display layout"
      cmd: |
        autorandr --save <profile-name>
      note: "Variations: --load <profile> to restore; --change to auto-detect"
    - desc: "Check battery status and charge thresholds"
      cmd: |
        tlp-stat -b
    - desc: "Force full battery charge (TLP)"
      cmd: |
        sudo tlp fullcharge
    - desc: "Set battery charge thresholds"
      cmd: |
        sudo tlp setcharge 75 80 BAT0
      note: "Format: start% stop% BAT0; run on AC power"
    - desc: "Calibrate the battery (TLP)"
      cmd: |
        sudo tlp recalibrate
    - desc: "Get detailed CPU information"
      cmd: |
        lscpu
    - desc: "Change CPU governor"
      cmd: change-cpu-performance.sh
      note: "Options: powersave | performance"
    - desc: "Show memory usage details"
      cmd: |
        cat /proc/meminfo
    - desc: "List block devices (disks and partitions)"
      cmd: |
        lsblk
    - desc: "Show kernel version and system info"
      cmd: |
        uname -a
    - desc: "View process tree"
      cmd: |
        pstree
    - desc: "Monitor layout: main + rotated secondary"
      cmd: |
        mons -S 0,7:R
      note: "Manual xrandr: xrandr --output DP-2-2 --mode 1920x1200 --rotate left"

c_language:
    - desc: "Compile C file with debug symbols (no optimizations)"
      cmd: |
        gcc -g -O0 main.c -o main.out
    - desc: "Generate compile_commands.json for make-based project"
      cmd: |
        bear -- make

debugging:
    - desc: "Disassemble executable, interleaved with source"
      cmd: |
        objdump -d -S a.out | less

docker:
    - desc: "Build image from Dockerfile"
      cmd: |
        docker build -t <my-image-name> -f <path/to/Dockerfile>
    - desc: "Run container (detached, with volume mount)"
      cmd: |
        docker run -d --name <container_name> -v </host/path>:</container/path> <img_name>
    - desc: "Open shell inside running container"
      cmd: |
        docker exec -it <container_name> bash
    - desc: "List all containers (running and stopped)"
      cmd: |
        docker ps -a
    - desc: "Stop a running container"
      cmd: |
        docker stop <container_name>
    - desc: "Remove a stopped container"
      cmd: |
        docker rm <container_name>
    - desc: "Remove a Docker image"
      cmd: |
        docker rmi <image_name>
    - desc: "Remove all dangling images"
      cmd: |
        docker rmi $(docker images -f "dangling=true" -q)
    - desc: "View container logs"
      cmd: |
        docker logs <container_name>
    - desc: "List all volumes"
      cmd: |
        docker volume ls
    - desc: "Remove a specific volume"
      cmd: |
        docker volume rm <volume_name>
    - desc: "Prune: unused containers, networks, images (dangling)"
      cmd: |
        docker system prune -f
      note: "Full cleanup incl. volumes: docker system prune --all --volumes --force"
    - desc: "Prune: all stopped containers"
      cmd: |
        docker container prune -f
    - desc: "Prune: unused images"
      cmd: |
        docker image prune -f
    - desc: "Prune: unused volumes"
      cmd: |
        docker volume prune -f
    - desc: "docker context: list"
      cmd: |
        docker context list
      note: "Variations: use <name> / rm <name> / create <name> --docker host=ssh://..."
    - desc: "docker context: switch (interactive)"
      cmd: |
        dctx
    - desc: "docker context: add"
      cmd: |
        dctx-add
    - desc: "docker context: remove"
      cmd: |
        dctx-rm
    - desc: "Inspect why healthcheck failed"
      cmd: |
        docker inspect --format='{{json .State.Health}}' <container-name> | jq

networking:
    - desc: "SSH escape sequence: force disconnect (<Enter~.>)"
      cmd: |
        \r\n~.
      note: "Terminates ssh session instantly when network is unresponsive. With the input of <Enter + `~` + command>, the ssh client  does not send it to server but process within the client. And <~.> means to close socket file and exit the process."
    - desc: "SSH to my dev server"
      cmd: |
        ssh -i ~/.ssh/dev-server.pem ubuntu@52.79.120.81
    - desc: "SSH connect via ssh-config (interactive host select)"
      cmd: |
        s
      note: "Edit config: se  (~/.ssh/config)"
    - desc: "Connect to Wi-Fi (prompts for password)"
      cmd: |
        nmcli device wifi connect <SSID> --ask
    - desc: "Show Wi-Fi password for current connection"
      cmd: |
        nmcli -s -g 802-11-wireless-security.psk connection show $(nmcli connection show | grep -i wifi |awk '{print $1 "\t" $3 "\t"  $4}'| column -t -s $'\t' | fzf | awk '{print $1}')
    - desc: "Show network link status"
      cmd: |
        ip link show
    - desc: "Show public IP address"
      cmd: |
        curl https://api.ipify.org; echo
    - desc: "Mount remote filesystem via sshfs"
      cmd: |
        sshfs -o IdentityFile=~/.ssh/dev-server.pem,reconnect,ServerAliveInterval=15,ServerAliveCountMax=3 ubuntu@3.39.132.9:/home/ubuntu/sshfs ~/jg/05.NMM/sshfs
      note: "Unmount: fusermount3 -u ~/ec2_mount"
    - desc: "Generate SSH key (RSA 4096)"
      cmd: |
        ssh-keygen -t rsa -b 4096 -C "<your_email@example.com>"
    - desc: "SSH connect with identity file"
      cmd: |
        ssh -i "<path/to/ssh-key.pem>" <username>@<host>
      note: "Run remote command without login: ssh <user>@<host> \"<command>\""
    - desc: "scp: transfer file (remote to local)"
      cmd: |
        scp <user>@<hostname>:/<remote/path>/<remotefile.txt> <local/path>/
      note: "Reverse (local to remote): scp -r <localdir> <user>@<hostname>:/<remote/path>/"
    - desc: "rsync: sync directory (local to remote, compressed, with progress)"
      cmd: |
        rsync -e "ssh -i <path/to/key>" -avzP <localdir>/ <user>@<hostname>:/<remote/path>/
      note: "Reverse (remote to local): swap source and destination"
    - desc: "SSH port forwarding (local 8080 -> remote 80)"
      cmd: |
        ssh -L 8080:localhost:80 <user>@<hostname>
      note: "SOCKS proxy alternative: ssh -D 1080 <user>@<hostname>"

remote_dev:
    - desc: "mutagen: create sync session (local <-> remote)"
      cmd: |
        mutagen sync create --ignore-vcs <local/path> <ssh_alias>:<remote/path> --name=<session_name>
      note: "--name: session alias, --ignore-vcs: respects .gitignore"
    - desc: "mutagen: pause sync session"
      cmd: |
        mutagen sync pause <session_name>
      note: "Keeps config, stops file transfer. Resume: mutagen sync resume <session_name>"
    - desc: "mutagen: terminate (permanently delete) sync session"
      cmd: |
        mutagen sync terminate <session_name>
    - desc: "mutagen: list all active sync sessions"
      cmd: |
        mutagen sync list
    - desc: "mutagen: stop the daemon"
      cmd: |
        mutagen daemon stop
      note: "Auto-restarts on next command"
    - desc: "mutagen: monitor a session in real time"
      cmd: |
        mutagen sync monitor <session_name>
    - desc: "mutagen: force-flush a session"
      cmd: |
        mutagen sync flush <session_name>
      note: "Use when changes are stuck and not syncing"

find_fd:
    - desc: "find: by name pattern"
      cmd: |
        find . -name "*.txt"
      note: "Variations: -type d (dirs only); -mtime -7 (modified last 7 days)"
    - desc: "find: delete matching files"
      cmd: |
        find . -name "*.log" -exec rm {} \;
    - desc: "find: match file a OR b"
      cmd: |
        find . -name '*.c' -o -name '*.h'
    - desc: "fd: find by extension"
      cmd: |
        fd "\.md$"
      note: "Variations: -e txt; -i for case-insensitive; --size +1k to filter by size"
    - desc: "fd: find and open matches with vim"
      cmd: |
        fd -e txt -x vim {}
    - desc: "fd: find files with 'test' OR 'example' in name"
      cmd: |
        fd "test|example"

disasm:
    - desc: "objdump: show program headers (ELF)"
      cmd: |
        objdump -p <file> | vi -c "set ft=asm"
      note: "Variations: -d (disassemble); -f (file header); readelf -l (segment info)"
    - desc: "objdump: disassemble executable sections"
      cmd: |
        objdump -d <file> | vi -c "set ft=asm"
    - desc: "objdump: disassemble interleaved with source"
      cmd: |
        objdump -d -S <file> | less
    - desc: "readelf: display program headers and segment info"
      cmd: |
        readelf -l <file> | vi -c "set ft=asm"

aws_configuration:
    - desc: "Set default region"
      cmd: |
        aws configure set region ap-northeast-2
      note: "After this, --region flag can be omitted"
    - desc: "View configured profiles"
      cmd: |
        aws configure list
    - desc: "Check current IAM credentials"
      cmd: |
        aws sts get-caller-identity
    - desc: "AWS TUI (powered by claws)"
      cmd: |
        aws-tui

aws_ec2_read_manage:
    - desc: "[read] List running instances (ID, name, state, IP, type)"
      cmd: |
        aws ec2 describe-instances --filters "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].{ID:InstanceId,Name:Tags[?Key=='Name']|[0].Value,State:State.Name,IP:PublicIpAddress,Type:InstanceType}" --output table
    - desc: "[read] List available AMIs (owned by this account)"
      cmd: |
        aws ec2 describe-images --owners self --query "Images[*].{ID:ImageId,Name:Name,Created:CreationDate}" --output table
      note: "Canonical (Ubuntu): --owners 099720109477; Amazon Linux: --owners amazon"
    - desc: "[read] List Ubuntu AMIs (Canonical, amd64 only)"
      cmd: |
        aws ec2 describe-images --owners 099720109477 --output json | jq '.Images[] | select(.Description | contains("amd64"))'
    - desc: "[read] Query and filter instance types"
      cmd: |
        aws ec2 describe-instance-types --output json | jq '.InstanceTypes[] | {InstanceType, CurrentGeneration, FreeTierEligible, ProcessorInfo, VCpuInfo, MemoryInfo, NetworkInfo} | select(.InstanceType | contains("t3."))'
    - desc: "[manage] Start instance"
      cmd: |
        aws ec2 start-instances --instance-ids <instance-id>
      note: "Variations: stop-instances / reboot-instances / modify-instance-attribute --instance-type <type>"
    - desc: "[manage] Create instance (minimal config)"
      cmd: |
        aws ec2 run-instances --image-id <ami-id> --count 1 --instance-type t2.micro --key-name <key-pair-name>
    - desc: "[delete] Terminate (delete) instance"
      cmd: |
        aws ec2 terminate-instances --instance-ids <instance-id>
    - desc: "[manage] Create/update instance tag"
      cmd: |
        aws ec2 create-tags --resources <instance-id> --tags Key=<tag-name>,Value=<tag-value>
      note: "Delete tag: aws ec2 delete-tags --resources <id> --tags Key=<name>"
    - desc: "[read] List EBS volumes (ID, size, state, type, attached instance)"
      cmd: |
        aws ec2 describe-volumes --query "Volumes[*].{ID:VolumeId,Size:Size,State:State,Type:VolumeType,InstanceId:Attachments[0].InstanceId}" --output table
    - desc: "[manage] Create EBS volume (10GB gp3)"
      cmd: |
        aws ec2 create-volume --size 10 --volume-type gp3 --availability-zone <availability-zone>
      note: "Attach: attach-volume --volume-id <id> --instance-id <id> --device /dev/sdf"
    - desc: "[manage] Detach EBS volume"
      cmd: |
        aws ec2 detach-volume --volume-id <volume-id>
    - desc: "[manage] Resize EBS volume"
      cmd: |
        aws ec2 modify-volume --volume-id <volume-id> --size 20
    - desc: "[delete] Delete EBS volume"
      cmd: |
        aws ec2 delete-volume --volume-id <volume-id>

aws_key_pair_security_group:
    - desc: "[read] List key pairs"
      cmd: |
        aws ec2 describe-key-pairs --query "KeyPairs[*].{Name:KeyName,Fingerprint:KeyFingerprint}" --output table
    - desc: "[manage] Create key pair (save output to file)"
      cmd: |
        aws ec2 create-key-pair --key-name <new-key-name> --query "KeyMaterial" --output text > <new-key-name>.pem
    - desc: "[delete] Delete key pair"
      cmd: |
        aws ec2 delete-key-pair --key-name <key-name>
    - desc: "[read] List security groups (ID, name, description, VPC ID)"
      cmd: |
        aws ec2 describe-security-groups --query "SecurityGroups[*].{ID:GroupId,Name:GroupName,Desc:Description,VpcId:VpcId}" --output table
      note: "View inbound rules: describe-security-groups --group-ids <sg-id> --query 'SecurityGroups[*].IpPermissions'"
    - desc: "[manage] Create security group"
      cmd: |
        aws ec2 create-security-group --group-name <sg-name> --description "My security group"
    - desc: "[manage] Add inbound rule (e.g., allow SSH port 22)"
      cmd: |
        aws ec2 authorize-security-group-ingress --group-id <sg-id> --protocol tcp --port 22 --cidr 0.0.0.0/0
    - desc: "[delete] Delete security group"
      cmd: |
        aws ec2 delete-security-group --group-id <sg-id>

aws_lambda_read_manage:
    - desc: "[read] List functions (name, runtime, last modified)"
      cmd: |
        aws lambda list-functions --query "Functions[*].{Name:FunctionName,Runtime:Runtime,LastModified:LastModified}" --output table
    - desc: "[read] Get details for a specific function"
      cmd: |
        aws lambda get-function --function-name <function-name>
    - desc: "[manage] Invoke function (result saved to response.json)"
      cmd: |
        aws lambda invoke --function-name <function-name> response.json
    - desc: "[manage] Update function code (upload zip)"
      cmd: |
        aws lambda update-function-code --function-name <function-name> --zip-file fileb://function.zip
    - desc: "[delete] Delete function"
      cmd: |
        aws lambda delete-function --function-name <function-name>

aws_s3_read_manage:
    - desc: "[read] List buckets"
      cmd: |
        aws s3 ls
      note: "List bucket contents: aws s3 ls s3://<bucket-name> --recursive"
    - desc: "[read] View bucket policy"
      cmd: |
        aws s3api get-bucket-policy --bucket <bucket-name>
      note: "Metadata: aws s3api head-bucket --bucket <bucket-name>"
    - desc: "[manage] Create bucket"
      cmd: |
        aws s3 mb s3://<new-bucket-name>
    - desc: "[manage] Upload file"
      cmd: |
        aws s3 cp <local-file> s3://<bucket-name>/
      note: "Download: aws s3 cp s3://<bucket>/<file> <local-path>"
    - desc: "[manage] Sync files (local to bucket)"
      cmd: |
        aws s3 sync <local-dir> s3://<bucket-name>/
    - desc: "[delete] Delete object"
      cmd: |
        aws s3 rm s3://<bucket-name>/<file-path>
    - desc: "[!CAUTION!] Force delete entire bucket including all files"
      cmd: |
        aws s3 rb s3://<bucket-name> --force

ssm_connectivity:
    - desc: "Start SSM session to EC2 instance"
      cmd: |
        aws ssm start-session --target <instance-id>
    - desc: "[read] List all active SSM sessions"
      cmd: |
        aws ssm describe-sessions --state Active
    - desc: "Force terminate an SSM session"
      cmd: |
        aws ssm terminate-session --session-id <session-id>

cloudwatch:
    - desc: "[read] List log groups"
      cmd: |
        aws logs describe-log-groups
    - desc: "[read] Tail a log stream in real time"
      cmd: |
        aws logs tail /aws/rds/instance/<instance-name>/postgresql --follow

systemd:
    - desc: "Check service status"
      cmd: |
        systemctl status <service-name>
    - desc: "Start service"
      cmd: |
        sudo systemctl start <service-name>
      note: "Variations: stop / restart / reload <service-name>"
    - desc: "Enable service on boot"
      cmd: |
        sudo systemctl enable <service-name>
      note: "Disable: systemctl disable <service-name>"
    - desc: "Tail service logs in real time"
      cmd: |
        journalctl -u <service-name> -f
      note: "Since last boot: journalctl -b; clean up: journalctl --vacuum-size=100M"
    - desc: "List failed services"
      cmd: |
        systemctl --failed
    - desc: "Find service file path"
      cmd: |
        systemctl show -p FragmentPath <service-name>
    - desc: "List timers (cron alternative)"
      cmd: |
        systemctl list-timers --all

pacman:
    - desc: "Search for a package"
      cmd: |
        pacman -Ss <keyword>
    - desc: "Show installed package info"
      cmd: |
        pacman -Qi <package>
      note: "List files installed by package: pacman -Ql <package>"
    - desc: "Find which package owns a file"
      cmd: |
        pacman -Qo <file-path>
    - desc: "Remove orphaned packages (no dependents)"
      cmd: |
        pacman -Rns $(pacman -Qdtq)
    - desc: "Clean package cache (keep last 3 versions)"
      cmd: |
        paccache -r
    - desc: "List explicitly installed packages"
      cmd: |
        pacman -Qe
    - desc: "Refresh mirror list (reflector)"
      cmd: |
        sudo reflector --country Korea,Japan --age 12 --protocol https --sort rate --save /etc/pacman.d/mirrorlist

disk_fs:
    - desc: "Summarize disk usage"
      cmd: |
        df -h
    - desc: "Top 10 largest items in current directory"
      cmd: |
        du -sh * | sort -rh | head -10
    - desc: "Find large files (over 100MB)"
      cmd: |
        find / -xdev -type f -size +100M 2>/dev/null | head -20
    - desc: "Monitor disk I/O"
      cmd: |
        iostat -x 1
    - desc: "List mounted filesystems"
      cmd: |
        findmnt --real
    - desc: "Check SMART disk health"
      cmd: |
        sudo smartctl -a /dev/<disk>

process:
    - desc: "Top processes by CPU usage"
      cmd: |
        ps aux --sort=-%cpu | head -15
      note: "By memory: ps aux --sort=-%mem | head -15"
    - desc: "Find process using a specific port"
      cmd: |
        ss -tlnp | grep <port>
    - desc: "Process tree for a specific PID"
      cmd: |
        pstree -p <pid>
    - desc: "List open files for a process"
      cmd: |
        lsof -p <pid>
    - desc: "Find zombie processes"
      cmd: |
        ps aux | awk '$8=="Z"'

text_processing:
    - desc: "awk: extract specific CSV columns (1st and 3rd)"
      cmd: |
        awk -F',' '{print $1, $3}' <file.csv>
    - desc: "awk: remove duplicate lines (without sorting)"
      cmd: |
        awk '!seen[$0]++' <file>
    - desc: "View diff between files with color"
      cmd: |
        diff --color=always <file1> <file2> | less -R
    - desc: "JSON pretty print"
      cmd: |
        cat <file.json> | jq '.'
    - desc: "sed: extract text between two patterns"
      cmd: |
        sed -n '/START/,/END/p' <file>
    - desc: "Convert tabs to 4 spaces"
      cmd: |
        expand -t 4 <file> > <output>

encryption:
    - desc: "Encrypt a file (gpg, symmetric key)"
      cmd: |
        gpg -c <file>
      note: "Decrypt: gpg -d <file.gpg> > <output>"
    - desc: "SHA256 checksum of a file"
      cmd: |
        sha256sum <file>
    - desc: "Show SSH public key fingerprint"
      cmd: |
        ssh-keygen -lf ~/.ssh/id_rsa.pub

cron:
    - desc: "View crontab"
      cmd: crontab -l
      note: "Edit: crontab -e"
    - desc: "Backup crontab"
      cmd: crontab -l > crontab.bak
      note: "Restore: crontab crontab.bak"
    - desc: "Remove crontab (irreversible)"
      cmd: crontab -ir

media:
    - desc: "play mp3 music within current dir"
      cmd: mpv ./*.mp3 --no-vid
      note: "use --shuffle"
